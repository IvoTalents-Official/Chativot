# ============================================================
#   CHATIVOT.COM — Docker Compose PRODUCCIÓN
#   Disaster Recovery / Nueva instancia AWS Lightsail
#
#   REQUISITOS:
#   1. Ubuntu 24.04 LTS con Docker instalado
#   2. Variables desde Vault: vault kv get secret/chativot/prod > .env
#   3. DNS apuntando a la nueva IP en Cloudflare
#
#   USO:
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

version: "3.8"

networks:
  chativot:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  chatwoot_storage:
  n8n_data:
  fzap_data:
  fzap_instances:
  zabbix_server_data:
  certbot_certs:
  certbot_html:

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    networks:
      - chativot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./scripts/servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    networks:
      - chativot
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - chativot
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chatwoot-rails:
    image: chatwoot/chatwoot:v4.11.2
    container_name: chatwoot-rails
    restart: always
    command: bundle exec rails s -p 3000 -b 0.0.0.0
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: https://chat.chativot.com
      DATABASE_URL: postgresql://${CHATWOOT_DB_USER}:${CHATWOOT_DB_PASSWORD}@postgres:5432/${CHATWOOT_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RAILS_LOG_TO_STDOUT: "true"
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
    volumes:
      - chatwoot_storage:/app/storage
    ports:
      - "3000:3000"
    networks:
      - chativot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:v4.11.2
    container_name: chatwoot-sidekiq
    restart: always
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: https://chat.chativot.com
      DATABASE_URL: postgresql://${CHATWOOT_DB_USER}:${CHATWOOT_DB_PASSWORD}@postgres:5432/${CHATWOOT_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      RAILS_LOG_TO_STDOUT: "true"
      MAILER_SENDER_EMAIL: ${MAILER_SENDER_EMAIL}
      SMTP_ADDRESS: ${SMTP_ADDRESS}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION}
      SMTP_ENABLE_STARTTLS_AUTO: ${SMTP_ENABLE_STARTTLS_AUTO}
    volumes:
      - chatwoot_storage:/app/storage
    networks:
      - chativot
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${N8N_DB}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: n8n.chativot.com
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.chativot.com/
      GENERIC_TIMEZONE: America/Santiago
      N8N_SECURE_COOKIE: "true"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - chativot
    depends_on:
      postgres:
        condition: service_healthy

  fzap:
    image: dncarbonell/fzap:latest
    container_name: fzap
    restart: always
    environment:
      TZ: America/Santiago
      FZAP_LANGUAGE: es-LATAM
      PUBLIC_BASE_URL: https://fzap.chativot.com
      ADMIN_TOKEN: ${FZAP_ADMIN_TOKEN}
      FLOUDS_LICENCE_KEY: ${FZAP_LICENCE_KEY}
      FLOUDS_LIFETIME_LICENCE_KEY: ""
      DB_DRIVER: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: fzap
      DB_USER: fzap
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SESSION_DEVICE_NAME: Fzap
      WEBHOOK_FORMAT: json
    volumes:
      - fzap_data:/app/dbdata
      - fzap_instances:/app/files
    ports:
      - "8080:8080"
    networks:
      - chativot
    depends_on:
      postgres:
        condition: service_healthy

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:latest
    container_name: zabbix-server
    restart: always
    environment:
      DB_SERVER_HOST: postgres
      DB_SERVER_PORT: 5432
      POSTGRES_DB: ${ZABBIX_DB}
      POSTGRES_USER: ${ZABBIX_DB_USER}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD}
      ZBX_CACHESIZE: 128M
    volumes:
      - zabbix_server_data:/var/lib/zabbix
    ports:
      - "10051:10051"
    networks:
      - chativot
    depends_on:
      postgres:
        condition: service_healthy

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    container_name: zabbix-web
    restart: always
    environment:
      DB_SERVER_HOST: postgres
      DB_SERVER_PORT: 5432
      POSTGRES_DB: ${ZABBIX_DB}
      POSTGRES_USER: ${ZABBIX_DB_USER}
      POSTGRES_PASSWORD: ${ZABBIX_DB_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: America/Santiago
    ports:
      - "8081:8080"
    networks:
      - chativot
    depends_on:
      - zabbix-server

  apache:
    image: httpd:2.4-alpine
    container_name: apache
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/conf-prod/:/usr/local/apache2/conf/extra/:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_html:/var/www/certbot:ro
    networks:
      - chativot
    depends_on:
      - chatwoot-rails
      - pgadmin
      - n8n
      - fzap
      - zabbix-web

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_html:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 6h & wait $${!}; certbot renew --webroot -w /var/www/certbot; done'"
    networks:
      - chativot

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: always
    environment:
      RI_PROXY_PATH: /
    ports:
      - "5540:5540"
    networks:
      - chativot
    depends_on:
      - redis
