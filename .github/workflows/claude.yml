name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          direct_prompt: |
            Eres un revisor de código experto para el proyecto Chativot 
            (CRM conversacional con Chatwoot + n8n + PostgreSQL + WhatsApp API).
            Revisa este PR y reporta: bugs, problemas de seguridad, 
            malas prácticas y mejoras sugeridas. Responde en español.
